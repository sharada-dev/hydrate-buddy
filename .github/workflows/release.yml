name: Build & Release

# Builds the Windows installer and publishes it to a GitHub Release
# whenever you push a version tag like v1.0.1.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the release and upload the installer

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish installer to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HydrateBuddy-Setup-*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
